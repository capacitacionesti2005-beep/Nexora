plugins {
    id "com.android.application"
}

android {
    namespace "com.nexora.driver"
    compileSdk 35

    defaultConfig {
        applicationId "com.nexora.driver"
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName "0.1.1-demo"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}
