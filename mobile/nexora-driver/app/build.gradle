plugins {
    id "com.android.application"
}

android {
    namespace "com.nexora.driver"
    compileSdk 35

    defaultConfig {
        applicationId "com.nexora.driverdemo"
        minSdk 23
        targetSdk 28
        versionCode 3
        versionName "0.1.2-demo"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}
